spring:
  datasource:
    url: jdbc:mysql://localhost:3306/gym_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Jakarta
    username: root
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        open-in-view: false

server:
  port: 8080

logging:
  level:
    com.gym.backend: DEBUG
